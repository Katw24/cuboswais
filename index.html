<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', Arial, sans-serif; }
  body {
    height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #f7f6f3, #eae7e2);
    color:#1a1a1a;
  }
  .box {
    background:#fff; padding:40px 36px; border-radius:18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    width: 320px; text-align:center;
  }
  h1 { font-size:1.3rem; font-weight:600; margin-bottom:6px; }
  p { font-size:0.85rem; color:#666; margin-bottom:22px; }
  input {
    width:100%; font-size:1.6rem; letter-spacing:6px; text-align:center;
    padding:12px 0; border-radius:10px; border:1px solid #ccc; margin-bottom:16px;
  }
  button {
    width:100%; padding:12px 0; border-radius:10px; border:none;
    background:#222; color:#fff; font-size:1rem; cursor:pointer;
  }
  button:hover { background:#444; }
  .msg { margin-top:14px; font-size:0.85rem; color:#c0392b; min-height:18px; }
</style>
</head>
<body>

  <div class="box">
    <h1>🔒 Acesso restrito</h1>
    <p>Digite o código de 6 dígitos do seu app autenticador</p>
    <input id="code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autofocus>
    <button onclick="checkCode()">Entrar</button>
    <div class="msg" id="msg"></div>
  </div>

<script>
// ================== CONFIGURAÇÃO ==================
// Esta é a chave secreta compartilhada com o app autenticador.
// Troque por uma nova se quiser gerar outra (veja instruções).
const SECRET_B32 = "UWFZRNFP2K2OG52SUGBENOAT5P3FKF2M";
// Para onde vai depois de liberar o acesso:
const DESTINO = "home.html";
// ====================================================

function base32ToBytes(base32) {
  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
  let bits = "";
  for (const c of base32.replace(/=+$/, "").toUpperCase()) {
    const val = alphabet.indexOf(c);
    if (val === -1) continue;
    bits += val.toString(2).padStart(5, "0");
  }
  const bytes = [];
  for (let i = 0; i + 8 <= bits.length; i += 8) {
    bytes.push(parseInt(bits.substr(i, 8), 2));
  }
  return new Uint8Array(bytes);
}

async function hmacSha1(keyBytes, msgBytes) {
  const key = await crypto.subtle.importKey(
    "raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
  );
  const sig = await crypto.subtle.sign("HMAC", key, msgBytes);
  return new Uint8Array(sig);
}

function counterToBytes(counter) {
  const buf = new ArrayBuffer(8);
  const view = new DataView(buf);
  // JS numbers are safe here for realistic counter sizes
  view.setUint32(4, counter);
  return new Uint8Array(buf);
}

async function totpAt(counter) {
  const keyBytes = base32ToBytes(SECRET_B32);
  const msgBytes = counterToBytes(counter);
  const hmac = await hmacSha1(keyBytes, msgBytes);
  const offset = hmac[hmac.length - 1] & 0xf;
  const code = ((hmac[offset] & 0x7f) << 24 |
                (hmac[offset + 1] & 0xff) << 16 |
                (hmac[offset + 2] & 0xff) << 8 |
                (hmac[offset + 3] & 0xff)) % 1000000;
  return code.toString().padStart(6, "0");
}

async function checkCode() {
  const input = document.getElementById("code").value.trim();
  const msg = document.getElementById("msg");
  const counter = Math.floor(Date.now() / 1000 / 3000);

  // aceita a janela atual e a anterior/seguinte (tolerância de relógio)
  for (const c of [counter, counter - 1, counter + 1]) {
    const valid = await totpAt(c);
    if (input === valid) {
      sessionStorage.setItem("categkids_ok", "1");
      window.location.href = DESTINO;
      return;
    }
  }
  msg.textContent = "Código incorreto. Tente novamente.";
}

document.getElementById("code").addEventListener("keydown", (e) => {
  if (e.key === "Enter") checkCode();
});
</script>

</body>
</html>
